spring.application.name=token-api-server

server.port=8090

spring.data.redis.host=localhost
spring.data.redis.port=6379

token.api.admin-secret=change-me-admin-secret
token.api.access-token-ttl-seconds=1800
token.api.issuer=token-api-server
token.api.jwt-secret=change-me-jwt-secret-change-me-jwt-secret
token.api.geumsangmall.client-id=geumsangmall-server
token.api.geumsangmall.access-key=${GEUMSANGMALL_ACCESS_KEY:change-me-geumsangmall-access-key}
token.api.geumsangmall.wss-secret-ttl-seconds=30

token.api.initial-clients[0].client-id=geumsangmall-server
token.api.initial-clients[0].client-secret=${GEUMSANGMALL_SERVER_CLIENT_SECRET:change-me-geumsangmall-server-secret}
token.api.initial-clients[0].system-code=GEUMSANGMALL
token.api.initial-clients[0].call-source=INTERNAL_BACKEND
token.api.initial-clients[0].active=true
token.api.initial-clients[0].scopes[0]=api.read
token.api.initial-clients[0].description=\uAE08\uC0C1\uBAB0 \uC11C\uBC84\uD22C\uC11C\uBC84 \uD638\uCD9C\uC6A9

token.api.initial-clients[1].client-id=sign-counsel-backend
token.api.initial-clients[1].client-secret=${SIGN_COUNSEL_BACKEND_CLIENT_SECRET:change-me-sign-counsel-backend-secret}
token.api.initial-clients[1].system-code=SIGN_COUNSEL
token.api.initial-clients[1].call-source=INTERNAL_BACKEND
token.api.initial-clients[1].active=true
token.api.initial-clients[1].scopes[0]=api.read
token.api.initial-clients[1].description=\uC218\uC5B4\uC0C1\uB2F4 \uBC31\uC5D4\uB4DC \uD638\uCD9C\uC6A9

token.api.initial-clients[2].client-id=statistics-backend
token.api.initial-clients[2].client-secret=${STATISTICS_BACKEND_CLIENT_SECRET:change-me-statistics-backend-secret}
token.api.initial-clients[2].system-code=STATISTICS
token.api.initial-clients[2].call-source=INTERNAL_BACKEND
token.api.initial-clients[2].active=true
token.api.initial-clients[2].scopes[0]=api.read
token.api.initial-clients[2].description=\uD1B5\uACC4\uC2DC\uC2A4\uD15C \uBC31\uC5D4\uB4DC \uD638\uCD9C\uC6A9

token.api.initial-clients[3].client-id=counsel-app-backend
token.api.initial-clients[3].client-secret=${COUNSEL_APP_BACKEND_CLIENT_SECRET:change-me-counsel-app-backend-secret}
token.api.initial-clients[3].system-code=COUNSEL_APP
token.api.initial-clients[3].call-source=INTERNAL_BACKEND
token.api.initial-clients[3].active=true
token.api.initial-clients[3].scopes[0]=api.read
token.api.initial-clients[3].description=\uC0C1\uB2F4APP \uBC31\uC5D4\uB4DC \uD638\uCD9C\uC6A9
